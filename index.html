<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamdhenu Restaurant - Premium 3D Experience</title>
    <!-- Tailwind CSS link style ke liye -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- GSAP Libraries Animation ke liye -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        body {
            background-color: #0d0d11;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }
        .pizza-3d {
            position: fixed;
            top: 35%;
            right: 10%;
            width: 350px;
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(0px 20px 30px rgba(0,0,0,0.7));
        }
    </style>
</head>
<body>

    <!-- Yeh hai woh Pizza ki image jo scroll karne par ghumegi -->
    <!-- Note: Yahan pngegg ya kisi site se bina background wali top-view pizza image ka link lagana -->
    <img src="https://i.imgur.com/bXN3910.png" class="pizza-3d" id="movingPizza" alt="3D Pizza">

    <!-- Section 1: Welcome Screen -->
    <section class="h-screen flex items-center px-12 relative">
        <div class="max-w-2xl">
            <h1 class="text-6xl font-extrabold text-amber-500 mb-4">Kamdhenu Restaurant</h1>
            <p class="text-xl text-gray-400">Taste the future of dining. Scroll down to explore our magic dishes.</p>
        </div>
    </section>

    <!-- Section 2: Interactive Menu Trigger -->
    <section class="h-screen flex items-center px-12 bg-zinc-900/50">
        <div class="max-w-xl">
            <h2 class="text-4xl font-bold text-white mb-4">Pure Vegetarian Wonders</h2>
            <p class="text-gray-400 text-lg">Hamare premium pizza aur North Indian dishes ka swad ab ek naye avatar mein. Har bite mein ek naya experience.</p>
        </div>
    </section>

    <!-- Section 3: Order Now -->
    <section class="h-screen flex items-center justify-center text-center px-12">
        <div>
            <h2 class="text-5xl font-black text-amber-500 mb-6">Ready to Order?</h2>
            <button class="bg-amber-500 hover:bg-amber-600 text-black font-bold text-xl py-4 px-8 rounded-full transition-all duration-300 transform hover:scale-105 shadow-lg">
                View Full Menu
            </button>
        </div>
    </section>

    <!-- JS Animation Script -->
    <script>
        // GSAP ko batana ki hum scroll trigger use kar rahe hain
        gsap.registerPlugin(ScrollTrigger);

        // Scroll karne par pizza ghumega aur thoda left-right rotate hoga
        gsap.to("#movingPizza", {
            rotation: 360, // Poora ek chakkar ghumega
            x: "-50vw",    // Scroll karne par right se left screen ki taraf aayega
            scale: 1.2,    // Thoda bada dikhega zoom hoke
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 1 // Yeh smooth animation banata hai scroll ke sath
            }
        });
    </script>
</body>
</html>
